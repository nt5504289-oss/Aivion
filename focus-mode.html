<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Timer</title>
    <link rel="icon" href="/public/logo.jpeg" class="logo">
    <link rel="stylesheet" href="/css/font.css">
    <link rel="stylesheet" href="/css/focus-mode.css">
    <meta property="og:title" content="Aivion, AI study companion">
    <meta property="og:description" content="AI Study Assistant">
    <meta property="og:url" content="https://aivion.fs0ciety.in/">
    <meta property="og:type" content="website">
    <meta name="description" content="AI Study Assistant">
    <meta name="author" content="Fs0coiety">
    <link rel="icon" href="/public/logo.jpeg" type="image/png">
</head>

<body>

    <button id="toggle">☰</button>

    <div id="overlay"></div>


    <div class="sidebar" id="sidebar1">

        <a href="index.html"><span><img src="/public/logo.png" alt="Logo" id="logo"></a>
        <button id="closeSidebar"><b>✕</b></button>


        <p id="nav-gap"></p>

        <ul>
            <li><button class="nav-btn"><a href="index.html">Home</a></button></li>
            <li><button class="nav-btn"><a href="chatbot.html">Chat-Bot</a></button></li>
            <li><button class="nav-btn"><a href="summarize.html">Summarizer</a></button></li>

            <li><button class="nav-btn"><a href="flashcards.html">Flashcards</a></button></li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">
        <h1 class="title">⏳ Study Timer</h1>
        <p class="subtitle">
            Stay focused with Pomodoro technique. Use lofi music to boost productivity.
        </p>

        <div class="timer-box">

            <div class="circle">
                <svg width="200" height="200">
                    <circle cx="100" cy="100" r="90" class="bg"></circle>
                    <circle cx="100" cy="100" r="90" class="progress" id="progress"></circle>
                </svg>
                <div class="time" id="time">25:00</div>
            </div>

            <div class="buttons">
                <button id="start">Start</button>
                <button id="pause">Pause</button>
                <button id="reset">Reset</button>
            </div>

            <div class="lofi">
                <button id="lofiBtn">🎧 Lofi Mode</button>
                <audio id="audio" loop>
                    <source src="/public/lofi.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="volume">
                🔊 Volume
                <input type="range" id="volume" min="0" max="1" step="0.01">
            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <div id="footer"></div>
    <script src="/js/index.js"></script>
    <script>
        fetch("footer.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("footer").innerHTML = data;
            });
    </script>

    <script src="/js/focus-mode.js"></script>
</body>

</html>
