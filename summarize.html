            <div class="header">

            </div>

                <div class="input-area">
                    <div>

                        <h3 id="text1">Enter your text here...
                        </h3>
                    </div>
                    <div class="userInput"><textarea name="userInput" id="input1" placeholder="Enter your text in the box below and click 'Summarize' to get a concise summary of your content."></textarea>
                        <div id="sendButton"><button type="submit">Summarize</button></div>
                    </div>

                </div>
                <div class="output-area">
                    <h3 id="text1">Summary:</h3>
                    <div class="userOutput">
                        <textarea readonly name="summaryOutput" id="summaryOutput" placeholder="Your summary will appear here. Click on the 'Copy' button to copy the text."></textarea>
                        <div id="cpybtn">
                            <button onclick="copyText()">Copy</button>
                        </div>

                    </div>

                </div>

            fetch("footer.html")
